version: '3.8'

services:
  cheaper_ticket_app:
    build: .
    container_name: agentic_flight_optimizer
    ports:
      - "49281:49281"
    environment:
      # Use host.docker.internal to allow the container to reach LM Studio on the host machine.
      # If your main server is Linux and host.docker.internal doesn't work out of the box,
      # extra_hosts enables host-gateway. Alternatively, use your server's actual IP address.
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
