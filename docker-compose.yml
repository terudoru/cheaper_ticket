version: '3.8'

services:
  cheaper_ticket_app:
    build: .
    container_name: agentic_flight_optimizer
    ports:
      - "8501:8501"
    environment:
      # Use host.docker.internal to allow the container to reach LM Studio on the host machine.
      # If your main server is Linux and host.docker.internal doesn't work, 
      # change this to your server's actual IP address (e.g., http://192.168.1.100:1234/v1)
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    restart: unless-stopped
